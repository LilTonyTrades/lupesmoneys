<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Content Security Policy. Locks the renderer down to local resources only:
      no remote scripts, no remote XHR. tesseract.js workers + WASM run from
      blob: URLs the worker spawns itself, so blob: must be allowed for
      script/worker. React/inline-style usage requires 'unsafe-inline' on style.
      Receipt previews use data:/blob: image URIs.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval' blob:;
      script-src-elem 'self' 'unsafe-inline' blob:;
      worker-src 'self' blob:;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob:;
      font-src 'self' data:;
      connect-src 'self' blob: data:;
      object-src 'none';
      base-uri 'self';
      form-action 'none';
      frame-ancestors 'none';
    ">
    <title>OpenClaw Books</title>
    <style>
      body { margin: 0; padding: 0; background: #0f0f1a; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Polyfills that must run before any ES modules load -->
    <script>
      if (!Promise.try) {
        Promise.try = function(fn) {
          return new Promise(function(resolve, reject) {
            try { resolve(fn()); } catch(e) { reject(e); }
          });
        };
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
