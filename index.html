<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Books</title>
    <style>
      body { margin: 0; padding: 0; background: #0f0f1a; overflow-x: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Polyfills that must run before any ES modules load -->
    <script>
      if (!Promise.try) {
        Promise.try = function(fn) {
          return new Promise(function(resolve, reject) {
            try { resolve(fn()); } catch(e) { reject(e); }
          });
        };
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
